<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.success-container {
    background: #fff;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 400px;
}

.success-container h1 {
    color: #28a745;
    margin-bottom: 20px;
}

.success-container p {
    font-size: 18px;
    margin-bottom: 30px;
}

.success-container a {
    display: inline-block;
    padding: 12px 25px;
    background-color: #081f44;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.3s;
}

.success-container a:hover {
    background-color: #42587a;
}
</style>
</head>
<body>

<div class="success-container">
    <h1>Payment Successful!</h1>
    <p>Thank you for your purchase.</p>
    <a href="product.html">Back to Store</a>
</div>

</body>
</html>
