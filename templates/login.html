<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"> <!-- Boxicons CDN -->
  <title>Login</title>
</head>
<body>

  <header>
    <a href="{{ url_for('home') }}" class="logo">
        <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Campus Logo" style="height:50px;">
    </a>
    <nav class="navigation">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('product') }}">Product</a>
      <a href="{{ url_for('post') }}">Post_item</a>
      <a href="{{url_for('profile')}}">Profile</a>
    </nav>
  </header>

  <section class="login" id="login">
    <div class="wrapper">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <ul class="flashes">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('login') }}" method="POST">
        <h1>LOGIN</h1>

        <div class="input-box">
            <input type="email" name="email" placeholder="Email" required>
            <i class='bx bxs-user'></i>
        </div>

        <div class="input-box">
          <input type="password" name="password" placeholder="Password" required>
          <i class='bx bxs-lock-alt'></i>
        </div>

        <div class="remember-forgot">
          <label><input type="checkbox" name="remember"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="register-link">
          <p>Don’t have an account? <a href="{{ url_for('register') }}">Register</a></p>
        </div>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2025 Campus Mini Store. All rights reserved.</p>
  </footer>

</body>
</html>
