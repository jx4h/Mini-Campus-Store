<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='post.css') }}">
  <title>Post Item</title>
</head>
<body>

  <header>
    <a href="{{ url_for('home') }}" class="logo">
        <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Campus Logo" style="height:50px;">
    </a>
    <nav class="navigation">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('product') }}">Product</a>
      <a href="{{ url_for('post') }}">Post Item</a>
      <a href="{{ url_for('cart') }}">Cart ({{ cart_count }})</a>
    </nav>
  </header>

  <section>
    <h2>Add New Product</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flashes">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
  </section>

  <form id="productForm" action="{{ url_for('post') }}" method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label for="productName">Product Name:</label>
      <input type="text" name="name" id="productName" required placeholder="Enter product name">
    </div>

    <div class="form-group">
      <label for="productDesc">Description:</label>
      <textarea name="description" id="productDesc" required placeholder="Enter description"></textarea>
    </div>

    <div class="form-group">
      <label for="productPrice">Price (EGP):</label>
      <input type="number" name="price" id="productPrice" required placeholder="Enter price">
    </div>

    <div class="form-group">
      <label for="category">Category:</label>
      <select name="category" id="categoryFilter">
        <option value="all">All Departments</option>
        <option value="engineering">Engineering</option>
        <option value="computer_science">Computer Science</option>
        <option value="medicine">Medicine & Health</option>
        <option value="pharmacy">Pharmacy</option>
        <option value="business">Business & Management</option>
        <option value="law">Law</option>
        <option value="arts">Arts & Humanities</option>
        <option value="science">Science</option>
        <option value="education">Education</option>
        <option value="architecture">Architecture</option>
        <option value="electronics">Electronics</option>
        <option value="fashion">Fashion & Accessories</option>
        <option value="office">Office Supplies</option>
        <option value="books">Books & Notes</option>
        <option value="sports">Sports & Fitness</option>
        <option value="gadgets">Gadgets & Tech</option>
        <option value="furniture">Furniture & Dorm</option>
      </select>
    </div>

    <div class="form-group">
      <label for="productImage">Image:</label>
      <input type="file" name="image" id="productImage" accept="image/*" required>
    </div>

    <button type="submit">Add Product</button>
  </form>

  <div class="products-list" id="productsList"></div>

  <footer>
    <p>©️ 2025 Campus Mini Store. All rights reserved.</p>
  </footer>

  <script>
    // Show preview before form is submitted
    document.getElementById("productImage").addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (event) {
          const html = `
            <div class="product-card">
              <img src="${event.target.result}" alt="Preview">
              <h3>${document.getElementById("productName").value}</h3>
              <p>${document.getElementById("productDesc").value}</p>
              <strong>EGP ${document.getElementById("productPrice").value}</strong>
              <button class="add-to-cart-btn">Add to Cart</button>
            </div>
          `;
          document.getElementById("productsList").innerHTML = html;

          // ================= ADD TO CART =================
          const addBtn = document.querySelector(".add-to-cart-btn");
          addBtn.addEventListener("click", function () {
            const name = document.getElementById("productName").value;
            const desc = document.getElementById("productDesc").value;
            const price = parseFloat(document.getElementById("productPrice").value);
            const imgSrc = event.target.result;

            const cart = JSON.parse(localStorage.getItem("cart")) || [];

            // تحقق إذا المنتج موجود بالفعل
            const existing = cart.find(item => item.name === name);
            if (existing) {
              existing.quantity += 1;
            } else {
              cart.push({ name, description: desc, price, image: imgSrc, quantity: 1 });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            alert(`${name} added to cart!`);
          });
        };
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
